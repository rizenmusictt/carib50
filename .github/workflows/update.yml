name: Carib50 Weekly Update

on:
  schedule:
    - cron: "0 12 * * 4"  # Every Thursday
  workflow_dispatch:     # manual run button

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Get repo code
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2. Set up Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run Carib50 engine
      - name: Run script
        run: python script.py
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      # 5. Commit updated charts
      - name: Commit results
        run: |
          git config user.name "carib50-bot"
          git config user.email "bot@carib50.com"
          git add data/
          git commit -m "Carib50 weekly update" || echo "No changes"
          git push
