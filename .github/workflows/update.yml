name: Update Carib100 Chart

on:
  schedule:
    # Runs at midnight (00:00 UTC) every Thursday
    - cron: '0 0 * * 4'
  
  # This lets you click "Run" manually whenever you want
  workflow_dispatch:

# Fixes the Node 20 deprecation warning by forcing Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-chart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Python Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python script.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Weekly Chart Update" && git push)
- name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 1. ADD THIS: Install gspread and google-auth
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth

      # 2. UPDATE THIS: Expose your Google variables to the running script
      - name: Run script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_NAME: "Your Spreadsheet Name Here" 
        run: python script.py
