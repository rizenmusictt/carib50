
    <html>
    <head>
      <title>Carib25</title>
      <style>
        body { background:#0f0f0f; color:white; font-family:Arial; }
        h1 { text-align:center; color:#ffcc00; }
        .song { display:flex; gap:10px; padding:10px; border-bottom:1px solid #222; align-items:center; }
        img { width:50px; height:50px; border-radius:4px; }
        .badge { font-size:11px; color:#ffcc00; }
        .up { color:#00ff99; }
        .down { color:#ff4d4d; }
        .new { color:#4da6ff; }
        .score { margin-left:auto; color:#00ff99; }
        button { margin:5px; padding:8px; background:#222; color:white; border:1px solid #333; }
      </style>
    </head>

    <body>

    <h1>Carib25</h1>

    <div style="text-align:center;">
      <button onclick="show('soca')">Soca</button>
      <button onclick="show('dancehall')">Dancehall</button>
      <button onclick="show('afrobeats')">Afrobeats</button>
      <button onclick="show('bouyon')">Bouyon</button>
    </div>

    <div id="app"></div>

    <script>
    const data = {"soca": [{"name": "SOCA CALIENTA", "artist": "Dj Samir", "image": "https://i.scdn.co/image/ab67616d0000b273afbca1379f8c2d595dfcedff", "badge": null, "rank": 1, "movement": "new", "score": 490}], "dancehall": [{"name": "Dancehall Nice (feat. Beres Hammond & Dexta Daps)", "artist": "Shaggy", "image": "https://i.scdn.co/image/ab67616d0000b2731c1936b8be85dcb195d00e02", "badge": null, "rank": 1, "movement": "new", "score": 450}], "afrobeats": [{"name": "Nakupenda", "artist": "TxC", "image": "https://i.scdn.co/image/ab67616d0000b273f91f29f049af023cc69b3d9f", "badge": null, "rank": 1, "movement": "new", "score": 750}, {"name": "CH\u00c9VERE (joes\u00f3n_type_beat)", "artist": "ARIA VEGA", "image": "https://i.scdn.co/image/ab67616d0000b273a041d1e4024bed274b48d393", "badge": null, "rank": 2, "movement": "new", "score": 740}, {"name": "ORGANIC - AFROBEAT", "artist": "100Beat", "image": "https://i.scdn.co/image/ab67616d0000b27358561955e3696028e7f2a035", "badge": null, "rank": 3, "movement": "new", "score": 340}, {"name": "Low (Afrobeat)", "artist": "LOVIXX", "image": "https://i.scdn.co/image/ab67616d0000b2734c6daf53e53e26ea7f933abd", "badge": "Fresh On De Scene", "rank": 4, "movement": "new", "score": 330}], "bouyon": [{"name": "unhappy", "artist": "s0rrow", "image": "https://i.scdn.co/image/ab67616d0000b273621d20b2632976bafe319295", "badge": null, "rank": 1, "movement": "new", "score": 780}, {"name": "In Di Corner", "artist": "1T1", "image": "https://i.scdn.co/image/ab67616d0000b2734431d73da54375299918144b", "badge": null, "rank": 2, "movement": "new", "score": 660}, {"name": "Wine It Slow", "artist": "T\u00c6RS", "image": "https://i.scdn.co/image/ab67616d0000b273b4ba0f6fd477a9fe49052f49", "badge": null, "rank": 3, "movement": "new", "score": 610}, {"name": "Bounce", "artist": "450", "image": "https://i.scdn.co/image/ab67616d0000b27357604f147e94c00213654842", "badge": "New Heat", "rank": 4, "movement": "new", "score": 490}, {"name": "Bouyon 2099", "artist": "Solar Million", "image": "https://i.scdn.co/image/ab67616d0000b2737cc101876070ac03d81c9ae0", "badge": "New Heat", "rank": 5, "movement": "new", "score": 280}, {"name": "Bouyon Rave", "artist": "Motto", "image": "https://i.scdn.co/image/ab67616d0000b273aad7d78f014116f3e939d1ae", "badge": null, "rank": 6, "movement": "new", "score": 160}]};

    function show(g) {
      const app = document.getElementById("app");
      app.innerHTML = "";

      data[g].forEach(s => {

        app.innerHTML += `
          <div class="song">

            <img src="${s.image || ''}">

            <div>
              #${s.rank} ${s.artist} - ${s.name}

              <div class="${s.movement}">
                ${s.movement === "up" ? "⬆ Rising"
                  : s.movement === "down" ? "⬇ Falling"
                  : "🆕 New"}
              </div>

              <div class="badge">${s.badge || ""}</div>
            </div>

            <div class="score">
              ${Math.round(s.score)}
            </div>

          </div>
        `;
      });
    }

    show('soca');
    </script>

    </body>
    </html>
