<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carib25</title>

  <style>
    body {
      background:#0f0f0f;
      color:white;
      font-family:Arial, sans-serif;
      margin:0;
    }

    h1 {
      text-align:center;
      color:#ffcc00;
      padding:15px 0;
      margin:0;
      border-bottom:1px solid #222;
    }

    .buttons {
      text-align:center;
      padding:10px;
    }

    button {
      margin:5px;
      padding:8px 12px;
      background:#222;
      color:white;
      border:1px solid #333;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover {
      background:#333;
    }

    .song {
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px;
      border-bottom:1px solid #222;
    }

    img {
      width:50px;
      height:50px;
      border-radius:6px;
    }

    .meta {
      font-size:12px;
      color:#aaa;
    }

    .badge {
      font-size:11px;
      color:#ffcc00;
      margin-top:3px;
    }

    .score {
      margin-left:auto;
      color:#00ff99;
      font-weight:bold;
    }

    .up { color:#00ff99; }
    .down { color:#ff4d4d; }
    .new { color:#4da6ff; }

  </style>
</head>

<body>

<h1>Carib25</h1>

<div class="buttons">
  <button onclick="render('soca')">Soca</button>
  <button onclick="render('dancehall')">Dancehall</button>
  <button onclick="render('afrobeats')">Afrobeats</button>
  <button onclick="render('bouyon')">Bouyon</button>
</div>

<div id="app"></div>

<script>
let data = {};

async function loadData() {
  try {
    const res = await fetch("data/charts.json");
    data = await res.json();

    render("soca");
  } catch (e) {
    document.getElementById("app").innerHTML =
      "<p style='padding:20px'>Failed to load charts.json</p>";
  }
}

function render(genre) {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const list = data[genre];

  if (!list || list.length === 0) {
    app.innerHTML = "<p style='padding:20px'>No data available</p>";
    return;
  }

  list.forEach(song => {

    let moveText = "";
    let moveClass = "";

    if (song.movement === "up") {
      moveText = "⬆ Rising";
      moveClass = "up";
    } else if (song.movement === "down") {
      moveText = "⬇ Falling";
      moveClass = "down";
    } else {
      moveText = "🆕 New Entry";
      moveClass = "new";
    }

    app.innerHTML += `
      <div class="song">

        <img src="${song.image || ''}">

        <div>
          #${song.rank || ''} ${song.artist || ''} - ${song.name || ''}

          <div class="meta ${moveClass}">
            ${moveText}
          </div>

          ${song.badge ? `<div class="badge">🔥 ${song.badge}</div>` : ""}
        </div>

        <div class="score">
          ${Math.round(song.score || 0)}
        </div>

      </div>
    `;
  });
}

loadData();
</script>

</body>
</html>
