<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carib50</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #111;
      border-bottom: 1px solid #222;
    }

    h1 {
      margin: 0;
      color: #ffcc00;
      letter-spacing: 2px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .genre {
      margin-top: 40px;
    }

    .genre h2 {
      color: #ffcc00;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }

    .song {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      border-bottom: 1px solid #222;
    }

    .song:hover {
      background: #1a1a1a;
    }

    .meta {
      font-size: 12px;
      color: #aaa;
    }

    .score {
      color: #00ff99;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1>CARIB50</h1>
  <div class="meta">Weekly Caribbean Music Charts</div>
</header>

<div class="container" id="app">
  Loading charts...
</div>

<script>
async function loadCharts() {
  const res = await fetch("data/charts.json");
  const data = await res.json();

  const app = document.getElementById("app");
  app.innerHTML = "";

  for (const genre in data) {

    const section = document.createElement("div");
    section.className = "genre";

    const title = document.createElement("h2");
    title.textContent = genre.toUpperCase();
    section.appendChild(title);

    data[genre].forEach((song, index) => {

      const row = document.createElement("div");
      row.className = "song";

      row.innerHTML = `
        <div>
          #${index + 1} ${song.artist} - ${song.name}
          <div class="meta">
            YouTube Growth: ${song.weekly_growth}
          </div>
        </div>

        <div class="score">
          ${Math.round(song.score)}
        </div>
      `;

      section.appendChild(row);
    });

    app.appendChild(section);
  }
}

loadCharts();
</script>

</body>
</html>
