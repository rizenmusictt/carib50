<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carib25</title>

<style>
:root {
  --bg:#0b0c10;
  --card:#1f2833;
  --text:#fff;
  --muted:#b5b5b5;
  --green:#1db954;
  --border:#2c3540;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:20px;
}

.container { max-width:900px; margin:auto; }

header {
  text-align:center;
  margin-bottom:25px;
}

header h1 {
  font-size:2.5rem;
  font-weight:900;
}

header p {
  color:var(--muted);
}

.tabs {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px 0;
}

.tab-btn {
  background:none;
  border:none;
  color:var(--muted);
  font-weight:600;
  cursor:pointer;
  padding:8px 14px;
}

.tab-btn.active {
  color:var(--green);
  border-bottom:2px solid var(--green);
}

.chart {
  background:var(--card);
  border-radius:10px;
  overflow:hidden;
}

.row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 15px;
  border-bottom:1px solid var(--border);
  gap:10px;
}

.row:hover {
  background:rgba(255,255,255,0.03);
}

.left {
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
  min-width:0;
}

.rank {
  display:none; /* removed clutter */
}

.art {
  width:50px;
  height:50px;
  border-radius:5px;
  object-fit:cover;
}

.meta {
  min-width:0;
}

.name {
  font-weight:600;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.artist {
  font-size:0.85rem;
  color:var(--muted);
}

.movement {
  min-width:120px;
  text-align:right;
  font-weight:600;
  font-size:0.85rem;
}

.movement.up { color:#4ade80; }
.movement.down { color:#f87171; }
.movement.same { color:var(--muted); }
.movement.new { color:#fbbf24; }

button.play {
  background:var(--green);
  border:none;
  color:#fff;
  padding:8px 10px;
  border-radius:20px;
  cursor:pointer;
  font-size:12px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content {
  width:90%;
  max-width:420px;
}

.close {
  text-align:right;
  margin-bottom:10px;
  cursor:pointer;
  color:#fff;
}
</style>
</head>

<body>

<div class="container">

<header>
  <h1>CARIB25</h1>
  <p>The Top 25 Songs This Week</p>
</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="switchGenre('soca')">Soca</button>
  <button class="tab-btn" onclick="switchGenre('dancehall')">Dancehall</button>
  <button class="tab-btn" onclick="switchGenre('afrobeats')">Afrobeats</button>
  <button class="tab-btn" onclick="switchGenre('bouyon')">Bouyon</button>
</nav>

<div class="chart" id="chart"></div>

</div>

<!-- SPOTIFY MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <div class="close" onclick="closeModal()">✕</div>
    <iframe id="frame" width="100%" height="380"
      frameborder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </div>
</div>

<script>

let db = {};
let genre = "soca";

async function load() {
  const res = await fetch("data/charts.json");
  db = await res.json();
  render();
}

function render() {
  const c = document.getElementById("chart");
  const list = db[genre];

  if (!list) return;

  c.innerHTML = "";

  list.forEach(t => {

    let cls = "same";
    if (t.movement?.includes("▲")) cls = "up";
    if (t.movement?.includes("▼")) cls = "down";
    if (t.movement?.includes("Fresh")) cls = "new";

    const row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
      <div class="left">
        <img class="art" src="${t.image}" />
        <div class="meta">
          <div class="name">${t.name}</div>
          <div class="artist">${t.artist}</div>
        </div>
      </div>

      <button class="play" onclick="openSpotify('${t.spotify_id}')">
        ▶ Listen
      </button>

      <div class="movement ${cls}">
        ${t.movement}
      </div>
    `;

    c.appendChild(row);
  });
}

function switchGenre(g) {
  genre = g;
  document.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.toggle("active", b.innerText.toLowerCase() === g);
  });
  render();
}

function openSpotify(id) {
  document.getElementById("frame").src =
    `https://open.spotify.com/embed/track/${id}`;

  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("frame").src = "";
}

window.onload = load;

</script>

</body>
</html>
