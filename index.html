def build_html(data):

    html = """
    <html>
    <head>
      <title>Carib25</title>
      <style>
        body {
          background:#0f0f0f;
          color:white;
          font-family:Arial;
        }

        h1 {
          color:#ffcc00;
          text-align:center;
        }

        .btn {
          margin:5px;
          padding:8px;
          cursor:pointer;
          background:#222;
          border:1px solid #333;
          color:white;
          border-radius:5px;
        }

        .song {
          display:flex;
          gap:12px;
          padding:10px;
          border-bottom:1px solid #222;
          align-items:center;
        }

        img {
          width:50px;
          height:50px;
          border-radius:4px;
        }

        .meta {
          font-size:11px;
          color:#aaa;
        }

        .badge {
          font-size:11px;
          color:#ffcc00;
          margin-top:2px;
        }

        .score {
          margin-left:auto;
          color:#00ff99;
          font-weight:bold;
        }

        .move {
          font-size:12px;
          margin-top:2px;
        }

        .up { color:#00ff99; }
        .down { color:#ff4d4d; }
        .new { color:#4da6ff; }

      </style>
    </head>

    <body>

    <h1>Carib25</h1>

    <div style="text-align:center;">
      <button class="btn" onclick="show('soca')">Soca</button>
      <button class="btn" onclick="show('dancehall')">Dancehall</button>
      <button class="btn" onclick="show('afrobeats')">Afrobeats</button>
      <button class="btn" onclick="show('bouyon')">Bouyon</button>
    </div>

    <div id="app"></div>

    <script>
    const data = """ + json.dumps(data) + """;

    function getMovement(song) {
      if (!song.previous_rank) return "new";
      const diff = song.previous_rank - song.rank;

      if (diff > 0) return "up";
      if (diff < 0) return "down";
      return "same";
    }

    function show(g) {
      const app = document.getElementById("app");
      app.innerHTML = "";

      data[g].forEach((s, i) => {

        const movement = s.movement || "new";

        let moveText = "";
        let moveClass = "";

        if (movement === "up") {
          moveText = "⬆ Rising";
          moveClass = "up";
        } else if (movement === "down") {
          moveText = "⬇ Falling";
          moveClass = "down";
        } else {
          moveText = "🆕 New Entry";
          moveClass = "new";
        }

        app.innerHTML += `
          <div class="song">

            <img src="${s.image || ''}">

            <div>
              #${i+1} ${s.artist} - ${s.name}

              <div class="meta ${moveClass}">
                ${moveText}
              </div>

              ${s.badge ? `<div class="badge">🔥 ${s.badge}</div>` : ""}
            </div>

            <div class="score">
              ${Math.round(s.score)}
            </div>

          </div>
        `;
      });
    }

    show('soca');
    </script>

    </body>
    </html>
    """

    with open("data/index.html", "w") as f:
        f.write(html)
