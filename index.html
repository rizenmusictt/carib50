<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carib25</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #111;
      border-bottom: 1px solid #222;
    }

    h1 {
      margin: 0;
      color: #ffcc00;
      letter-spacing: 2px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 15px;
      flex-wrap: wrap;
    }

    button {
      background: #222;
      color: white;
      border: 1px solid #333;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #333;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 10px;
    }

    .song {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-bottom: 1px solid #222;
    }

    .song img {
      width: 50px;
      height: 50px;
      border-radius: 4px;
    }

    .meta {
      font-size: 12px;
      color: #aaa;
    }

    .score {
      margin-left: auto;
      color: #00ff99;
      font-weight: bold;
    }

    .rank {
      width: 30px;
      color: #888;
    }
  </style>
</head>

<body>

<header>
  <h1>CARIB25</h1>
  <div class="meta">Weekly Caribbean Music Charts</div>
</header>

<div class="buttons">
  <button onclick="showGenre('soca')">Soca</button>
  <button onclick="showGenre('dancehall')">Dancehall</button>
  <button onclick="showGenre('afrobeats')">Afrobeats</button>
  <button onclick="showGenre('bouyon')">Bouyon</button>
</div>

<div class="container" id="app">
  Loading charts...
</div>

<script>
let chartData = {};

async function loadData() {
  const res = await fetch("data/charts.json");
  chartData = await res.json();

  showGenre("soca");
}

function showGenre(genre) {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const list = chartData[genre];

  if (!list) {
    app.innerHTML = "<p>No data available yet.</p>";
    return;
  }

  list.forEach((song, i) => {
    const row = document.createElement("div");
    row.className = "song";

    row.innerHTML = `
      <div class="rank">#${i + 1}</div>

      <img src="${song.image || ''}" />

      <div>
        <div>${song.artist} - ${song.name}</div>
        <div class="meta">
          ${song.mode === "spotify_only" ? "Spotify Mode" : "Full Mode"}
        </div>
      </div>

      <div class="score">
        ${Math.round(song.score)}
      </div>
    `;

    app.appendChild(row);
  });
}

loadData();
</script>

</body>
</html>
