name: Update Carib100 Chart

# 1. When should this run?
on:
  schedule:
    # Runs at midnight (00:00 UTC) every Thursday (4)
    - cron: '0 0 * * 4'
  
  # This line allows you to click a "Run" button manually whenever you want
  workflow_dispatch:

# 2. Give the robot permission to save files
permissions:
  contents: write

# 3. The exact steps the robot will take
jobs:
  update-chart:
    runs-on: ubuntu-latest

    steps:
      # Step A: Download your repository files into the cloud computer
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step B: Install Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step C: Run your script (and give it access to your hidden password)
      - name: Run Python Script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python script.py

      # Step D: Save the new data.json file and push it live
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          
          # This checks if the file actually changed. If it did, it saves it.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Weekly Chart Update" && git push)
